<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Platform - Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-10 border border-gray-100">
        <h1 class="text-3xl font-bold text-slate-800 mb-2">Admin Login</h1>
        <p class="text-gray-400 mb-8 font-medium">Access your dashboard</p>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Email Address</label>
                <input type="email" name="email" class="w-full p-4 bg-gray-50 border-2 border-gray-50 rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all" placeholder="admin@example.com" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Password</label>
                <input type="password" name="password" class="w-full p-4 bg-gray-50 border-2 border-gray-50 rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 transition-all active:scale-95">
                Sign In
            </button>
        </form>
    </div>

    <script src="supabase.js"></script>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const { email, password } = Object.fromEntries(formData.entries());

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                alert(error.message);
            } else {
                window.location.href = 'admin.html';
            }
        };
    </script>
</body>
</html>
